name: Windows Package

on:
  workflow_dispatch:
    inputs:
      run_e2e:
        description: Run Playwright E2E tests before packaging
        required: false
        default: false
        type: boolean
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  validate:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            release/app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install native app dependencies
        run: npm ci --prefix release/app

      - name: Rebuild native modules for Electron
        run: npm run rebuild

      - name: Build
        run: npm run build

      - name: Validate release gates
        run: npm run verify:release

      - name: Run E2E tests (optional)
        if: github.event_name == 'workflow_dispatch' && inputs.run_e2e
        run: |
          npx playwright install chromium
          npm run test:e2e

  package:
    if: github.event_name != 'pull_request'
    needs: validate
    runs-on: windows-latest
    env:
      CSC_LINK: ${{ secrets.WINDOWS_CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.WINDOWS_CSC_KEY_PASSWORD }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            release/app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install native app dependencies
        run: npm ci --prefix release/app

      - name: Rebuild native modules for Electron
        run: npm run rebuild

      - name: Build Windows artifacts (NSIS + ZIP)
        run: npm run package:win

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-package-${{ github.sha }}
          path: |
            release/build/*.exe
            release/build/*.zip
            release/build/latest*.yml
          if-no-files-found: error

      - name: Publish GitHub release assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/build/*.exe
            release/build/*.zip
            release/build/latest*.yml
